<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>EnergiKu — Riwayat</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="brand-icon"><i class="fas fa-bolt"></i></div><div class="brand-name">EnergiKu</div></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Utama</div>
      <a href="index.html" class="nav-item"><i class="fas fa-gauge-high"></i> Dashboard</a>
      <a href="input.html" class="nav-item"><i class="fas fa-calculator"></i> Input Energi</a>
      <a href="history.html" class="nav-item active"><i class="fas fa-clock-rotate-left"></i> Riwayat Log</a>
      <div class="nav-section-label">Fitur Tambahan</div>
      <a href="target.html" class="nav-item"><i class="fas fa-bullseye"></i> Target & Simulasi</a>
      <a href="edukasi.html" class="nav-item"><i class="fas fa-book-open"></i> Edukasi & Tips</a>
      <a href="pengaturan.html" class="nav-item"><i class="fas fa-gear"></i> Pengaturan Tarif</a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar"><div class="page-title-area"><h1>Log Riwayat Penggunaan</h1><p>Semua data catatan kalkulasi emisi harian Anda</p></div></div>
    <div class="page-content">
      <div class="card">
        <div class="card-header">
          <div class="card-title">Tabel Riwayat</div>
          <button class="btn btn-danger" onclick="hapusSemua()"><i class="fas fa-trash"></i> Reset Data</button>
        </div>
        <div class="card-body">
          <table class="data-table">
            <thead>
              <tr><th>Tanggal</th><th>Listrik</th><th>BBM</th><th>Air</th><th>Total Biaya</th><th>Jejak CO₂</th></tr>
            </thead>
            <tbody id="tabelBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script>
    function loadTable() {
      const records = DB.getRecords();
      const body = document.getElementById('tabelBody');
      body.innerHTML = records.map(r => `
        <tr>
          <td><b>${r.tanggal}</b></td>
          <td>${r.listrik} kWh</td>
          <td>${r.bbm} L</td>
          <td>${r.air} m³</td>
          <td>Rp ${r.biaya.toLocaleString('id-ID')}</td>
          <td><span class="badge badge-green">${r.co2} kg CO₂</span></td>
        </tr>
      `).join('');
    }
    function hapusSemua() {
      if(confirm("Apakah Anda yakin ingin menghapus semua data?")) {
        DB.saveRecords([]);
        loadTable();
      }
    }
    loadTable();
  </script>
</body>
</html>
