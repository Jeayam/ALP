<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>EnergiKu — Catat Energi</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-title"><i class="fas fa-leaf"></i> EnergiKu</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Utama</div>
      <a href="/index" class="nav-item"><i class="fas fa-chart-pie"></i> Dashboard</a>
      <a href="/input" class="nav-item active"><i class="fas fa-pen-to-square"></i> Input Energi</a>
      <a href="/history" class="nav-item"><i class="fas fa-history"></i> Riwayat Log</a>
      
      <div class="nav-section-label">Fitur Tambahan</div>
      <a href="/target" class="nav-item"><i class="fas fa-bullseye"></i> Target & Acuan</a>
      <a href="/edukasi" class="nav-item"><i class="fas fa-book-open"></i> Edukasi & Tips</a>
      <a href="/pengaturan" class="nav-item"><i class="fas fa-sliders"></i> Pengaturan Tarif</a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1 id="pageTitle">Catat Penggunaan Energi</h1>
      <p>Masukkan estimasi konsumsi energi harian rumah tangga Anda</p>
    </div>

    <div class="card">
      <form id="energyForm" onsubmit="simpanRecord(event)">
        <input type="hidden" id="recordId" value="">

        <div class="form-group">
          <label for="tanggal">Pilih Tanggal Laporan</label>
          <div class="input-group">
            <input type="date" id="tanggal" required style="border-radius: var(--radius-sm);">
          </div>
        </div>

        <div class="form-group">
          <label for="listrik">Penggunaan Listrik</label>
          <div class="input-group">
            <input type="number" step="0.01" id="listrik" placeholder="Contoh: 12.5" required>
            <span class="input-unit">kWh</span>
          </div>
        </div>

        <div class="form-group">
          <label for="bbm">Konsumsi BBM Kendaraan</label>
          <div class="input-group">
            <input type="number" step="0.01" id="bbm" placeholder="Contoh: 2.0" required>
            <span class="input-unit">Liter</span>
          </div>
        </div>

        <div class="form-group">
          <label for="air">Penggunaan Air Bersih</label>
          <div class="input-group">
            <input type="number" step="0.01" id="air" placeholder="Contoh: 0.4" required>
            <span class="input-unit">m³</span>
          </div>
        </div>

        <button type="submit" class="btn btn-primary">
          <i class="fas fa-save"></i> Simpan Catatan Pengeluaran
        </button>
      </form>
    </div>
  </main>

  <script src="/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", checkEditMode);
  </script>
</body>
</html>
