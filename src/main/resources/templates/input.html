<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>EnergiKu — Input Data</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="fas fa-bolt"></i></div>
      <div class="brand-name">EnergiKu</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Utama</div>
      <a href="index.html" class="nav-item"><i class="fas fa-gauge-high"></i> Dashboard</a>
      <a href="input.html" class="nav-item active"><i class="fas fa-calculator"></i> Input Energi</a>
      <a href="history.html" class="nav-item"><i class="fas fa-clock-rotate-left"></i> Riwayat Log</a>
      <div class="nav-section-label">Fitur Tambahan</div>
      <a href="target.html" class="nav-item"><i class="fas fa-bullseye"></i> Target & Simulasi</a>
      <a href="edukasi.html" class="nav-item"><i class="fas fa-book-open"></i> Edukasi & Tips</a>
      <a href="pengaturan.html" class="nav-item"><i class="fas fa-gear"></i> Pengaturan Tarif</a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar"><div class="page-title-area"><h1>Kalkulator & Input Harian</h1><p>Catat penggunaan sumber daya hari ini</p></div></div>
    <div class="page-content">
      <div class="card">
        <div class="card-header"><div class="card-title">Form Input</div></div>
        <div class="card-body">
          <div class="form-grid">
            <div class="form-group"><label>Tanggal Catat</label><input type="date" id="txtTanggal"></div>
            <div class="form-group"><label>Listrik (kWh)</label><input type="number" id="txtListrik" value="0"></div>
            <div class="form-group"><label>BBM (Liter)</label><input type="number" id="txtBBM" value="0"></div>
            <div class="form-group"><label>Air (m³)</label><input type="number" id="txtAir" value="0"></div>
          </div>
          <button class="btn btn-primary" onclick="simpanData()"><i class="fas fa-save"></i> Hitung & Simpan</button>
        </div>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script>
    document.getElementById('txtTanggal').value = new Date().toISOString().split('T')[0];
    function simpanData() {
      const records = DB.getRecords();
      const settings = DB.getSettings();
      
      const listrik = parseFloat(document.getElementById('txtListrik').value) || 0;
      const bbm = parseFloat(document.getElementById('txtBBM').value) || 0;
      const air = parseFloat(document.getElementById('txtAir').value) || 0;
      
      const biaya = (listrik * settings.tarifListrik) + (bbm * settings.hargaBBM) + (air * settings.tarifAir);
      const co2 = parseFloat(((listrik * 0.85) + (bbm * 2.3)).toFixed(1));

      records.push({
        tanggal: document.getElementById('txtTanggal').value,
        listrik, bbm, air, biaya, co2
      });
      
      DB.saveRecords(records);
      alert('Data berhasil disimpan kalkulasi otomatis selesai!');
      window.location.href = 'history.html';
    }
  </script>
</body>
</html>
