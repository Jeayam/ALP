<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>EnergiKu — Target</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="brand-icon"><i class="fas fa-bolt"></i></div><div class="brand-name">EnergiKu</div></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Utama</div>
      <a href="index.html" class="nav-item"><i class="fas fa-gauge-high"></i> Dashboard</a>
      <a href="input.html" class="nav-item"><i class="fas fa-calculator"></i> Input Energi</a>
      <a href="history.html" class="nav-item"><i class="fas fa-clock-rotate-left"></i> Riwayat Log</a>
      <div class="nav-section-label">Fitur Tambahan</div>
      <a href="target.html" class="nav-item active"><i class="fas fa-bullseye"></i> Target & Simulasi</a>
      <a href="edukasi.html" class="nav-item"><i class="fas fa-book-open"></i> Edukasi & Tips</a>
      <a href="pengaturan.html" class="nav-item"><i class="fas fa-gear"></i> Pengaturan Tarif</a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar"><div class="page-title-area"><h1>Ambang Batas & Target Hemat</h1><p>Batasi penggunaan energi agar tidak melebihi anggaran global</p></div></div>
    <div class="page-content">
      <div class="alert alert-warning"><i class="fas fa-triangle-exclamation"></i> Menetapkan batas membantu mengurangi efek gas rumah kaca secara mandiri.</div>
      <div class="card">
        <div class="card-body">
          <div class="form-group"><label>Target Batas Listrik Bulanan (kWh)</label><input type="number" id="tgtListrik"></div>
          <button class="btn btn-primary" onclick="saveTarget()">Simpan Batas Target</button>
        </div>
      </div>
    </div>
  </main>
  <script src="js/app.js"></script>
  <script>
    const tg = DB.getTargets();
    document.getElementById('tgtListrik').value = tg.listrik;
    function saveTarget(){
      DB.saveTargets({ listrik: document.getElementById('tgtListrik').value, bbm: tg.bbm, air: tg.air });
      alert("Target hemat berhasil diperbarui!");
    }
  </script>
</body>
</html>
