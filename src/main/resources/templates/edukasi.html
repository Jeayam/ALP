<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>EnergiKu — Edukasi & Tips</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .edu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-top: 10px; }
    .edu-card { background: var(--white); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 24px; border-top: 4px solid var(--accent-green); }
    .edu-card h3 { font-size: 18px; color: var(--bg-sidebar); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
    .edu-card p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
    .badge { background-color: var(--accent-light); color: var(--accent-green); padding: 4px 8px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 700; display: inline-block; margin-bottom: 12px; }
    
    /* Menjaga agar konten tidak kepanjangan */
/* Update CSS ini di bagian <style> kamu */

.edu-card p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 3; /* Cuma tampil 3 baris awal */
    -webkit-box-orient: vertical;
    overflow: hidden;
    transition: all 0.3s ease; /* Transisi halus */
    margin: 0; /* Tambahkan ini agar tidak ada margin bawaan */
}

/* Menggunakan target :hover pada container kartu */
.edu-card:hover p {
    -webkit-line-clamp: unset !important; /* Paksa buka semua teks */
    color: #333; /* Opsional: teks berubah jadi lebih gelap saat hover */
}
 </style>
</head>
<body>

<aside class="sidebar">
  <div>
    <div class="sidebar-brand">
      <div class="brand-title"><i class="fas fa-leaf"></i> EnergiKu</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Utama</div>
      <a th:href="@{/index}" class="nav-item"><i class="fas fa-chart-pie"></i> Dashboard</a>
      <a th:href="@{/input}" class="nav-item"><i class="fas fa-pen-to-square"></i> Input Energi</a>
      <a th:href="@{/history}" class="nav-item"><i class="fas fa-history"></i> Riwayat Log</a>
      
      <div class="nav-section-label">Fitur Tambahan</div>
      <a th:href="@{/target}" class="nav-item"><i class="fas fa-bullseye"></i> Target & Acuan</a>
      <a th:href="@{/edukasi}" class="nav-item"><i class="fas fa-book-open"></i> Edukasi & Tips</a>
      <a th:href="@{/pengaturan}" class="nav-item"><i class="fas fa-sliders"></i> Pengaturan Tarif</a>

      <div class="nav-section-label" style="margin-top: 20px; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 15px;">Sesi Akun</div>
      <a th:href="@{/logout}" class="nav-item" style="color: #e74c3c;"><i class="fas fa-right-from-bracket"></i> Keluar (Log Out)</a>
    </nav>
  </div>

  <!-- Card Profil Eco-Warrior -->
  <div class="sidebar-profile-card">
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
      <div style="width: 35px; height: 35px; background: var(--accent-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">E</div>
      <div>
        <h5 style="margin: 0; color: white; font-size: 14px;" th:text="${usernameAktif != null ? usernameAktif : 'Eco User'}">Eco User</h5>
        <span style="font-size: 11px; color: #a0aec0;">Eco Warrior</span>
      </div>
    </div>
    <div style="background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center;">
      <span style="font-size: 11px; color: #cbd5e0;"><i class="fas fa-star" style="color: #ecc94b;"></i> Eco-Points:</span>
      <strong id="sidebarPoints" style="color: #ecc94b; font-size: 13px;">0 XP</strong>
    </div>
  </div>
</aside>

  <main class="main">
    <div class="topbar">
      <h1>Wawasan & Panduan Keberlanjutan</h1>
      <p>Tips praktis mengurangi jejak karbon dan efisiensi konsumsi energi harian rumah tangga</p>
    </div>

    <div class="edu-grid" id="eduContainer">
      </div>
  </main> 

</body> 

<div th:replace="~{fragments/footer :: footer}" style="width: 100%; grid-column: 1 / -1;"></div>
<script>
    // Fungsi memuat data edukasi dari database
    function loadEdukasi() {
      fetch('/api/edukasi')
        .then(response => response.json())
        .then(data => {
          const container = document.getElementById("eduContainer");
          container.innerHTML = ""; // Bersihkan isi sebelum diisi data baru

          data.forEach(item => {
            // Tentukan warna border berdasarkan kategori agar menarik
            let borderColor = "var(--accent-green)";
            if (item.kategori === "BBM") borderColor = "var(--accent-warm)";
            if (item.kategori === "Air") borderColor = "#3498db";

            container.innerHTML += `
              <div class="edu-card" style="border-top-color: ${borderColor};">
                <span class="badge">${item.kategori}</span>
                <h3><i class="fas fa-lightbulb"></i> ${item.judul}</h3>
                <p>${item.kontenTips}</p>
              </div>
            `;
          });
        })
        .catch(err => {
          console.error("Gagal mengambil data edukasi:", err);
          document.getElementById("eduContainer").innerHTML = "<p>Data edukasi sedang tidak tersedia.</p>";
        });
    }

    // Panggil fungsi saat halaman dimuat
    document.addEventListener("DOMContentLoaded", loadEdukasi);
  </script>
</html>
