<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>EnergiKu — Pengaturan</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div th:replace="~{fragments/sidebar :: sidebar(page='pengaturan')}"></div>


  <main class="main">
    <div class="topbar">
      <h1>Pengaturan Tarif Dasar</h1>
      <p>Konfigurasi basis tarif pengali biaya otomatis pada sistem backend</p>
    </div>

    <div class="card">
      <form onsubmit="event.preventDefault();">
        <div class="form-group">
          <label>Tarif Listrik Dasar</label>
          <div class="input-group"><input type="text" value="1444" disabled style="background-color: #f1ede6;"><span class="input-unit">Rp/kWh</span></div>
        </div>
        <div class="form-group">
          <label>Harga BBM Rata-rata</label>
          <div class="input-group"><input type="text" value="10000" disabled style="background-color: #f1ede6;"><span class="input-unit">Rp/Liter</span></div>
        </div>
        <button class="btn btn-primary" style="background-color: var(--text-muted); cursor: not-allowed;" disabled><i class="fas fa-lock"></i> Konfigurasi Terkunci</button>
      </form>
    </div>
  </main>

</body>
<div th:replace="~{fragments/footer :: footer}" style="width: 100%; grid-column: 1 / -1;"></div>
</html>
